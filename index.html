<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rescripta Editorial — En construcción</title>

  <!-- Evita indexación mientras está en construcción (puedes quitarlo después) -->
  <meta name="robots" content="noindex,nofollow" />

  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.5;
      display: grid;
      min-height: 100svh;
      place-items: center;
      padding: 32px 16px;
      background: #0b0d12;
      color: #e7e9ee;
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 28px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: .2px; }
    p { margin: 10px 0; opacity: .92; }
    .muted { opacity: .72; font-size: 14px; }
    .pill {
      display: inline-block;
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      font-size: 13px;
      opacity: .9;
    }
    a { color: inherit; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Rescripta Editorial</h1>
    <p>Estamos preparando el sitio.</p>
    <p class="muted">Próximamente: catálogo, manifiesto editorial y novedades.</p>
    <span class="pill">En construcción</span>
  </main>
</body>
</html>
